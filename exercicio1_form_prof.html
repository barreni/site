<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário - Exercício 1</title>
</head>

<body>
    <header>
        <h1>Formulário</h1>

        <section id="form" name="form">
            <h2>Preencha os campos abaixo:</h2>

            <form action="">
                <label for="nome">Nome Completo: </label>
                <input type="text" id="nome" name="nome" required size="63"><br><br>

                <label for="email">E-mail: </label>
                <input type="email" id="email" name="email" required size="40">

                <label for="idade">Idade: </label>
                <input type="number" id="idade" name="idade" required size="8"><br><br>

                <label for="materia">Para qual matéria você está se candidatando para lecionar: </label>
                <select name="materia" id="materia" required>

                    <option value="matematica">Matemática</option>
                    <option value="portugues">Português</option>
                    <option value="biologia">Biologia</option>
                    <option value="ciencias">Ciências</option>
                    <option value="historia">História</option>
                    <option value="geografia">Geografia</option>
                    <option value="artes">Artes</option>
                </select><br><br>

                <label for="escolaridade">Nível de Escolaridade</label>
                <select name="escolaridade" id="escolaridade">Nível de Escolaridade:
                    <option value="superiorcompleto">Ensino Superior Completo</option>
                    <option value="cursandomestrado">Cursando Mestrado</option>
                    <option value="mestradocompleto">Mestrado Completo</option>
                    <option value="cursandodoutorado">Cursando Doutorado</option>
                    <option value="doutoradocompleto">Doutorado Completo</option>
                </select><br><br>

                <label for="descricaosi">Descrição sobre si mesmo: </label><br>
                <textarea name="descricaosi" id="descricaosi" cols="80" rows="20"></textarea>
                <br><br>



            </form>

        </section>
    </header>

</body>
